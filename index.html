<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi novia · Día de la Mujer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tarjeta">
        <h1>✨ Para la mujer más especial ✨</h1>
        <div class="sub">Mi novia, mi guía, mi inspiración</div>

        <!-- Familia de ositos mejor proporcionada -->
        <div class="familia-ositos">
            <!-- Osita principal con gafas y shorts (shores) -->
            <div class="osita">
                <div class="oreja izq"></div>
                <div class="oreja der"></div>
                <div class="cabeza"></div>
                <!-- Mejillas sonrosadas (nuevo) -->
                <div class="mejilla izq"></div>
                <div class="mejilla der"></div>
                <div class="hocico"></div>
                <!-- Ojos -->
                <div class="ojo izq"><div class="pupila"><div class="brillo"></div></div></div>
                <div class="ojo der"><div class="pupila"><div class="brillo"></div></div></div>
                <!-- Gafas -->
                <div class="gafas">
                    <div class="aro izq"></div>
                    <div class="aro der"></div>
                    <div class="puente"></div>
                    <div class="patilla"></div>
                    <div class="patilla der"></div>
                </div>
                <!-- Nariz y boca -->
                <div class="nariz"></div>
                <div class="boca"></div>
                <!-- Cuerpo y shorts -->
                <div class="cuerpo"></div>
                <div class="shorts">
                    <span class="iniciales">PAGM</span>
                </div>
            </div>

            <!-- Osito pequeño (busito) con ombligo estampado -->
            <div class="osito-peque">
                <div class="orejita izq"></div>
                <div class="orejita der"></div>
                <div class="cabecita"></div>
                <!-- Mejillas del pequeño -->
                <div class="mejillita izq"></div>
                <div class="mejillita der"></div>
                <div class="ojitos izq"><div class="pupilita"></div></div>
                <div class="ojitos der"><div class="pupilita"></div></div>
                <!-- ombligo (hombligo) -->
                <div class="ombligo"></div>
                <div class="cuerpecito"></div>
                <!-- naricita pequeña -->
                <div class="naricita"></div>
            </div>
        </div>

        <!-- Botón que al presionar muestra el mensaje -->
        <button class="boton-romantico" id="botonMagico">🌸 FELIZ DÍA DE LA MUJER 🌸</button>

        <!-- Contenedor de nubes (mensaje romántico) -->
        <div class="contenedor-nubes" id="nubesMensaje"></div>

        <div class="piesito">
            <span>P</span> <span>A</span> <span>G</span> <span>M</span> · siempre juntos ❤️
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
